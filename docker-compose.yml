# Docker Compose for Autism Platform
version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  # Frontend can be served via Nginx or Vercel
  # This compose focuses on the backend API